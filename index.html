<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Business Growth Landing</title>

<style>
:root{
  --bg1:#f6f7ff;
  --bg2:#eef3ff;
  --card:#ffffff;
  --text:#14151c;
  --muted:#5a6172;
  --accent:#6c63ff;
  --accent2:#8a7dff;
  --border:#e8eaf3;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:linear-gradient(145deg,var(--bg1),var(--bg2));
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 5%;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}

.logo{
  font-weight:800;
  font-size:13px;
  letter-spacing:1px;
}

/* LANG */
.lang button{
  background:#fff;
  border:1px solid var(--border);
  padding:5px 8px;
  margin-left:4px;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
}

/* HERO */
.hero{
  padding:40px 5% 20px;
  max-width:900px;
}

.hero h1{
  font-size:28px;
  line-height:1.3;
  background:linear-gradient(90deg,#2d2f7f,#6c63ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  margin-top:12px;
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

/* CTA */
.cta{
  margin-top:18px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.cta button{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  transition:0.2s;
}

.cta button:hover{
  background:var(--accent2);
}

/* SECTIONS */
.section{
  padding:25px 5%;
}

.section h2{
  font-size:18px;
  margin-bottom:10px;
}

.section p{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:10px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:14px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(20,20,50,0.06);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 35px rgba(20,20,50,0.1);
}

/* TRUST */
.trust{
  background:#fff;
  border:1px solid var(--border);
  padding:15px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(20,20,50,0.06);
}

/* FINAL CTA */
.final{
  text-align:center;
  padding:40px 5%;
}

.final h2{
  font-size:20px;
  line-height:1.3;
}

.final button{
  margin-top:15px;
  background:var(--accent);
  color:#fff;
  border:none;
  padding:12px 16px;
  border-radius:10px;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  color:var(--muted);
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <div class="logo">BUSINESS GROWTH</div>

  <div class="lang">
    <button onclick="setLang('hy')">AM</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('ru')">RU</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1 data-i18n="hero_title">
    Քո բիզնեսը կարող է ունենալ իրական օնլայն վաճառքներ
  </h1>

  <p data-i18n="hero_sub">
    Մենք կառուցում ենք պարզ, արագ և վաճառք ապահովող էջեր, որոնք օգնում են բիզնեսներին աճել օնլայն։
  </p>

  <div class="cta">
    <button data-i18n="cta1">Իմանալ ավելին</button>
    <button data-i18n="cta2">Կապվել</button>
  </div>
</section>

<!-- PROBLEM -->
<section class="section">
  <h2 data-i18n="p_title">Խնդիրը</h2>
  <p data-i18n="p_text"></p>
</section>

<!-- SOLUTION -->
<section class="section">
  <h2 data-i18n="s_title">Լուծումը</h2>

  <div class="grid">
    <div class="card" data-i18n="s1"></div>
    <div class="card" data-i18n="s2"></div>
    <div class="card" data-i18n="s3"></div>
    <div class="card" data-i18n="s4"></div>
  </div>
</section>

<!-- TRUST -->
<section class="section">
  <h2 data-i18n="t_title">Վստահիր մեզ քո բիզնեսը</h2>

  <div class="trust" data-i18n="t_text"></div>
</section>

<!-- EDUCATION -->
<section class="section">
  <h2 data-i18n="e_title">Փորձ և ուսուցում</h2>

  <div class="trust" data-i18n="e_text"></div>
</section>

<!-- FINAL CTA -->
<section class="final">
  <h2 data-i18n="f_title"></h2>
  <button data-i18n="f_btn"></button>
</section>

<footer data-i18n="footer"></footer>
