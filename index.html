<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shopify Growth Studio</title>

<style>
:root{
  --bg:#f6f3ef;
  --text:#1d1d1d;
  --muted:#6a6a6a;
  --accent:#2f6f5e;
  --border:#e9e2d8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:0 auto;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 5%;
  background:#fff;
  border-bottom:1px solid var(--border);
}

.logo{
  font-weight:800;
  font-size:13px;
  line-height:1.2;
}

.logo div{
  font-size:11px;
  color:#6a6a6a;
  margin-top:2px;
}

.lang-switch button{
  background:none;
  border:none;
  margin-left:8px;
  cursor:pointer;
  font-size:12px;
  color:var(--muted);
}

/* HERO */
.hero{
  padding:40px 5% 20px;
}

.hero-grid{
  display:flex;
  gap:30px;
  align-items:center;
}

.hero-text h1{
  font-size:26px;
  margin-bottom:10px;
}

.hero-text p{
  font-size:14px;
  color:var(--muted);
  margin-bottom:18px;
}

.cta a{
  background:var(--accent);
  color:#fff;
  padding:12px 16px;
  border-radius:10px;
  text-decoration:none;
}

/* IMAGE */
.hero-visual img{
  width:100%;
  border-radius:14px;
}

/* SECTION */
.section{
  padding:14px 5%;
}

.highlight{
  background:#fff;
  border:1px solid var(--border);
  padding:12px;
  border-radius:12px;
  font-size:13px;
  color:var(--muted);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  padding:12px;
  border-radius:12px;
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}

/* SERVICES */
.services-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

/* GRAPH */
.graph img{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

/* FINAL FIXED SPACING */
.final{
  text-align:center;
  padding:40px 5%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

.final h2{
  margin:0;
  font-size:20px;
  line-height:1.3;
}

.final a{
  background:var(--accent);
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  text-decoration:none;
}

/* FLOAT */
.whatsapp-float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:#25D366;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-decoration:none;
  font-size:22px;
}

/* MOBILE */
@media (max-width:768px){

  .hero-grid{
    flex-direction:column;
    text-align:center;
    gap:16px;
  }

  .grid,
  .services-grid{
    grid-template-columns:1fr;
  }

  .card{
    font-size:13px;
    line-height:1.5;
    word-break:break-word;
  }

  .section{
    padding:12px 4%;
  }

  .hero-text h1{
    font-size:22px;
  }

  .hero-text p{
    font-size:13px;
  }

  .highlight{
    font-size:12.5px;
  }
}
</style>
</head>

<body>

<div class="container">

<header>
  <div class="logo">
    Nona | Shopify Developer
    <div>Shopify Landing Pages & Conversion Systems</div>
  </div>

  <div class="lang-switch">
    <button onclick="setLang('hy')">HY</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('ru')">RU</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-grid">

    <div class="hero-text">
      <h1 id="hero_title"></h1>
      <p id="hero_text"></p>

      <div class="cta">
        <a id="cta_btn" href="" target="_blank"></a>
      </div>
    </div>

    <div class="hero-visual">
      <img src="https://www.e-ways.com.tw/upload/article/article_479.jpg">
    </div>

  </div>
</section>

<!-- VALUE -->
<section class="section">
  <div class="grid">
    <div class="card" id="value_1"></div>
    <div class="card" id="value_2"></div>
  </div>
</section>

<!-- SERVICES -->
<section class="section">
  <h2 id="services_title"></h2>

  <div class="highlight" id="services_intro"></div>

  <div class="services-grid">

    <!-- HY / EN / RU controlled via JS if needed -->
    <div class="card" id="s1"></div>
    <div class="card" id="s2"></div>
    <div class="card" id="s3"></div>
    <div class="card" id="s4"></div>
    <div class="card" id="s5"></div>

  </div>
</section>

<!-- GROWTH -->
<section class="section">

  <div class="graph">
    <img src="https://t4.ftcdn.net/jpg/09/00/62/97/360_F_900629727_nLFzv8NdpbQEefppwbBUbpqDBBsl6uWB.jpg">
  </div>

  <div class="highlight" id="growth_text"></div>

</section>

<!-- FINAL -->
<section class="final">
  <h2 id="final_title"></h2>
  <a id="final_cta" href="" target="_blank"></a>
</section>

</div>

<a class="whatsapp-float" id="wa_float" href="" target="_blank">💬</a>

function setLang(lang){

  const d = content[lang];

  document.getElementById("hero_title").innerText = d.hero_title || "";
  document.getElementById("hero_text").innerText = d.hero_text || "";

  document.getElementById("cta_btn").innerText = d.cta || "";

  document.getElementById("final_title").innerText = d.final_title || "";

setLang('hy');

</script>

</body>
</html>
