<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shopify Growth Studio</title>

<style>
:root{
  --bg:#f6f3ef;
  --text:#1d1d1d;
  --muted:#6a6a6a;
  --accent:#2f6f5e;
  --border:#e9e2d8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:0 auto;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 5%;
  background:#fff;
  border-bottom:1px solid var(--border);
}

.logo{
  font-weight:800;
  font-size:13px;
}

.lang-switch button{
  background:none;
  border:none;
  margin-left:8px;
  cursor:pointer;
  font-size:12px;
  color:var(--muted);
}

/* HERO */
.hero{
  padding:40px 5% 20px;
}

.hero-grid{
  display:flex;
  gap:30px;
  align-items:center;
}

.hero-text h1{
  font-size:26px;
  margin-bottom:10px;
}

.hero-text p{
  font-size:14px;
  color:var(--muted);
  margin-bottom:18px;
}

.cta a{
  background:var(--accent);
  color:#fff;
  padding:12px 16px;
  border-radius:10px;
  text-decoration:none;
}

.hero-visual{
  position:relative;
}

.hero-visual img.main{
  width:100%;
  border-radius:14px;
}

.hero-visual img.overlay{
  position:absolute;
  top:-20px;
  left:-20px;
  width:120%;
  opacity:0.1;
}

/* SERVICES */
.services-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  font-size:13px;
  color:var(--muted);
}

.section{
  padding:14px 5%;
}

.highlight{
  background:#fff;
  border:1px solid var(--border);
  padding:12px;
  border-radius:12px;
  font-size:13px;
  color:var(--muted);
}

/* FINAL */
.final{
  text-align:center;
  padding:30px 5%;
}

.final a{
  background:var(--accent);
  color:#fff;
  padding:12px 16px;
  border-radius:10px;
  text-decoration:none;
}

/* FLOAT */
.whatsapp-float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:#25D366;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

/* MOBILE */
@media(max-width:900px){
  .hero-grid{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<div class="container">

<header>
  <div class="logo">SHOPIFY GROWTH STUDIO</div>

  <div class="lang-switch">
    <button onclick="setLang('hy')">HY</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('ru')">RU</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-grid">

    <div class="hero-text">
      <h1 id="hero_title"></h1>
      <p id="hero_text"></p>

      <div class="cta">
        <a id="cta_btn" href="https://wa.me/0000"></a>
      </div>
    </div>

    <div class="hero-visual">
      <img class="main" src="https://www.e-ways.com.tw/upload/article/article_479.jpg">
      <img class="overlay" src="https://t4.ftcdn.net/jpg/09/00/62/97/360_F_900629727_nLFzv8NdpbQEefppwbBUbpqDBBsl6uWB.jpg">
    </div>

  </div>
</section>

<!-- SERVICES -->
<section class="section">
  <h2 id="services_title"></h2>

  <div class="highlight" id="services_intro"></div>

  <div class="services-grid" style="margin-top:10px;">
    <div class="card" id="s1"></div>
    <div class="card" id="s2"></div>
    <div class="card" id="s3"></div>
    <div class="card" id="s4"></div>
    <div class="card" id="s5"></div>
  </div>
</section>

<!-- FINAL -->
<section class="final">
  <h2 id="final_title"></h2>
  <a id="final_cta" href="https://wa.me/0000"></a>
</section>

</div>

<a class="whatsapp-float" href="https://wa.me/0000">💬</a>

<script>

  final_cta:"Начать сейчас"
}

};

function setLang(lang){
  document.getElementById("hero_title").innerText = content[lang].hero_title;
  document.getElementById("hero_text").innerText = content[lang].hero_text;
  document.getElementById("cta_btn").innerText = content[lang].cta;

  document.getElementById("services_title").innerText = content[lang].services_title;
  document.getElementById("services_intro").innerText = content[lang].services_intro;

  document.getElementById("s1").innerText = content[lang].s1;
  document.getElementById("s2").innerText = content[lang].s2;
  document.getElementById("s3").innerText = content[lang].s3;
  document.getElementById("s4").innerText = content[lang].s4;
  document.getElementById("s5").innerText = content[lang].s5;

  document.getElementById("final_title").innerText = content[lang].final_title;
  document.getElementById("final_cta").innerText = content[lang].final_cta;
}

setLang('hy');
</script>

</body>
</html>
