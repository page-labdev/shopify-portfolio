<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title></title>

<style>
:root{
  --bg:#fbf7f2;
  --text:#1d1d1d;
  --muted:#6a6a6a;
  --accent:#2f6f5e;
  --border:#eee7dd;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 5%;
  background:#fff;
  border-bottom:1px solid var(--border);
}

/* HERO */
.hero{
  padding:22px 5%;
}

.hero img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:14px;
  margin-bottom:12px;
}

/* SECTIONS */
.section{
  padding:22px 5%;
}

.box{
  background:#fff;
  border:1px solid var(--border);
  padding:14px;
  border-radius:14px;
}

/* GRAPH */
.graph img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:14px;
  margin-top:10px;
}

/* FLOAT BUTTON */
.whatsapp-float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:#25D366;
  color:#fff;
  width:52px;
  height:52px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header></header>

<!-- HERO IMAGE ONLY -->
<section class="hero">
  <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=80"/>
</section>

<!-- GRAPH IMAGE -->
<section class="section">
  <div class="graph">
    <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=1200&q=80"/>
  </div>
</section>

<!-- FLOAT BUTTON -->
<a class="whatsapp-float" href="#">
  💬
</a>

<footer></footer>

</body>
</html>
