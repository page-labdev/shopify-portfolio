<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Business Growth Landing</title>

<style>
:root{
  --bg:#fbf7f2;
  --card:#ffffff;
  --text:#1d1d1d;
  --muted:#6a6a6a;
  --accent:#2f6f5e;
  --gold:#c9a86a;
  --border:#eee7dd;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 5%;
  background:#fff;
  border-bottom:1px solid var(--border);
}

.logo{
  font-weight:800;
  font-size:13px;
}

.lang button{
  background:#fff;
  border:1px solid var(--border);
  padding:5px 8px;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
}

/* HERO */
.hero{
  padding:25px 5%;
}

.hero-img{
  width:100%;
  height:180px;
  border-radius:14px;
  object-fit:cover;
  margin-bottom:15px;
}

.hero h1{
  font-size:24px;
  line-height:1.3;
}

.hero p{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

.cta{
  margin-top:15px;
  display:flex;
  gap:10px;
}

.cta button{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
}

/* SECTIONS */
.section{
  padding:25px 5%;
}

.section h2{
  font-size:18px;
  margin-bottom:10px;
}

.section p{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-top:10px;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card .text{
  padding:12px;
  font-size:14px;
}

/* TRUST IMAGE BLOCK */
.trust{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-top:10px;
}

.trust img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.trust .text{
  padding:12px;
  font-size:14px;
  color:var(--muted);
}

/* FINAL */
.final{
  text-align:center;
  padding:35px 5%;
}

.final h2{
  font-size:20px;
}

.final button{
  margin-top:15px;
  background:var(--accent);
  color:#fff;
  border:none;
  padding:12px 16px;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
  <div class="logo">BUSINESS GROWTH</div>

  <div class="lang">
    <button onclick="setLang('hy')">AM</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('ru')">RU</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">

  <img class="hero-img"
  src="https://images.unsplash.com/photo-1556741533-f6acd647d2fb?w=1200"
  alt="business" />

  <h1 data-i18n="hero_title">
    Քո բիզնեսը կարող է ունենալ իրական օնլայն վաճառքներ
  </h1>

  <p data-i18n="hero_sub">
    Մենք կառուցում ենք պարզ և արդյունավետ էջեր, որոնք օգնում են բիզնեսներին աճել օնլայն։
  </p>

  <div class="cta">
    <button data-i18n="cta1">Իմանալ ավելին</button>
    <button data-i18n="cta2">Կապվել</button>
  </div>
</section>

<!-- PROBLEM -->
<section class="section">
  <h2 data-i18n="p_title">Խնդիրը</h2>

  <div class="trust">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1200" />
    <div class="text" data-i18n="p_text"></div>
  </div>
</section>

<!-- SOLUTION -->
<section class="section">
  <h2 data-i18n="s_title">Լուծումը</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1200"/>
      <div class="text" data-i18n="s1"></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1556745753-b2904692b3cd?w=1200"/>
      <div class="text" data-i18n="s2"></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1553877522-43269d4ea984?w=1200"/>
      <div class="text" data-i18n="s3"></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1556741533-f6acd647d2fb?w=1200"/>
      <div class="text" data-i18n="s4"></div>
    </div>

  </div>
</section>

<!-- TRUST -->
<section class="section">
  <h2 data-i18n="t_title">Վստահիր մեզ քո բիզնեսը</h2>

  <div class="trust">
    <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=1200"/>
    <div class="text" data-i18n="t_text"></div>
  </div>
</section>

<!-- EDUCATION -->
<section class="section">
  <h2 data-i18n="e_title">Փորձ և ուսուցում</h2>

  <div class="trust">
    <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=1200"/>
    <div class="text" data-i18n="e_text"></div>
  </div>
</section>

<!-- FINAL -->
<section class="final">
  <h2 data-i18n="f_title"></h2>
  <button data-i18n="f_btn"></button>
</section>

<footer data-i18n="footer"></footer>

<script>

 }

function setLang(l){
 document.querySelectorAll("[data-i18n]").forEach(el=>{
  el.innerText=t[l][el.getAttribute("data-i18n")];

}
</script>

</body>
</html>
